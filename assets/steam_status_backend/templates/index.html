<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam 状态控制台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- 背景粒子 -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">
    <!-- 顶栏 -->
    <header class="header">
      <div class="logo">
        <svg class="steam-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.454 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.252 0-2.265-1.014-2.265-2.265z"/>
        </svg>
        <span>Steam 状态控制台</span>
      </div>

      <div class="connection-badge" id="connectionBadge">
        <span class="status-dot" id="statusDot"></span>
        <span id="connectionText">连接中…</span>
      </div>
    </header>

    <!-- 账号信息卡片 -->
    <div class="card account-card" id="accountCard">
      <div class="card-inner">
        <div class="account-info">
          <div class="avatar-ring">
            <div class="avatar-placeholder">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
              </svg>
            </div>
          </div>
          <div class="account-details">
            <div class="account-name" id="accountName">未登录</div>
            <div class="account-status" id="accountStatus">请稍候…</div>
          </div>
        </div>
        <div style="display:flex; gap:6px; align-items:center;">
          <button class="btn btn-ghost btn-sm" id="logoutBtn" style="display:none" onclick="logout()">
            切换账号
          </button>
        </div>
      </div>
    </div>

    <!-- Steam Guard 输入（需要时显示） -->
    <div class="card guard-card" id="guardCard" style="display:none">
      <div class="guard-header">
        <svg class="guard-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
        </svg>
        <div>
          <div class="guard-title" id="guardTitle">Steam Guard 验证</div>
          <div class="guard-subtitle" id="guardSubtitle">请输入验证码</div>
        </div>
      </div>
      <div class="guard-input-row">
        <input
          type="text"
          id="guardCodeInput"
          class="input guard-input"
          placeholder="XXXXX"
          maxlength="8"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn btn-primary" onclick="submitGuardCode()">确认</button>
      </div>
    </div>

    <!-- 手机 App 批准（需要时显示） -->
    <div class="card guard-card" id="mobileApprovalCard" style="display:none">
      <div class="guard-header">
        <svg class="guard-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/>
        </svg>
        <div>
          <div class="guard-title">等待手机批准</div>
          <div class="guard-subtitle" style="color:var(--color-accent)">请在 Steam 手机 App 确认本次登录</div>
        </div>
      </div>
      <div style="text-align:center; padding: 10px 0;">
        <span class="pulse-dot" style="display:inline-block; width:12px; height:12px; margin-right:8px; animation: pulse 1.5s infinite;"></span>
        <span style="font-size:14px; color:var(--text-secondary)">正在等待您的确认...</span>
      </div>
    </div>

    <!-- 登录卡片 -->
    <div class="card login-card" id="loginCard" style="display:none">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
        Steam 登录
      </div>
      
      <div id="sessionLoginWrap" style="display:none; margin-bottom:16px;">
        <div id="savedAccountsList"></div>
        <div style="text-align:center; margin-top:12px;">
          <a href="#" onclick="showPasswordLogin()" class="btn btn-ghost btn-sm" style="width: 100%; box-sizing: border-box;">+ 添加新账号 / 使用密码登录</a>
        </div>
      </div>

      <div id="passwordLoginWrap">
        <div class="input-group">
          <input type="text" id="loginUsername" class="input" placeholder="Steam 用户名" autocomplete="off" />
        </div>
        <div class="input-group">
          <input type="password" id="loginPassword" class="input" placeholder="Steam 密码" autocomplete="off" />
        </div>
        <div style="display: flex; gap: 8px;">
          <button class="btn btn-ghost" id="backToSessionsBtn" style="display:none; padding: 0 12px;" onclick="showSessionLogin()" title="返回选择账号">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
          </button>
          <button class="btn btn-primary btn-full" id="loginBtn" onclick="loginWithPassword()">
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
            </svg>
            登录
          </button>
        </div>
      </div>
    </div>

    <!-- 副状态选择卡片 -->
    <div class="card persona-card" id="personaCard" style="display:none">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
        </svg>
        副状态
      </div>
      <div class="persona-grid" id="personaGrid">
        <button class="persona-btn" id="pstate-1" data-state="1" onclick="setPersonaState(1)">
          <span class="persona-dot online"></span>在线
        </button>
        <button class="persona-btn" id="pstate-2" data-state="2" onclick="setPersonaState(2)">
          <span class="persona-dot busy"></span>忙碌
        </button>
        <button class="persona-btn" id="pstate-3" data-state="3" onclick="setPersonaState(3)">
          <span class="persona-dot away"></span>离开
        </button>
        <button class="persona-btn" id="pstate-4" data-state="4" onclick="setPersonaState(4)">
          <span class="persona-dot snooze"></span>打盹
        </button>
        <button class="persona-btn" id="pstate-5" data-state="5" onclick="setPersonaState(5)">
          <span class="persona-dot trade"></span>找交易
        </button>
        <button class="persona-btn" id="pstate-6" data-state="6" onclick="setPersonaState(6)">
          <span class="persona-dot play"></span>找伙伴
        </button>
        <button class="persona-btn" id="pstate-7" data-state="7" onclick="setPersonaState(7)">
          <span class="persona-dot invisible"></span>隐身
        </button>
      </div>
    </div>

    <!-- 主控制区 -->
    <div class="card main-card" id="mainCard" style="display:none">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
        </svg>
        自定义状态
      </div>

      <!-- 当前状态显示 -->
      <div class="current-status-bar" id="currentStatusBar" style="display:none">
        <div class="current-status-inner">
          <span class="pulse-dot"></span>
          <div style="display:flex; flex-direction:column; gap:2px; min-width:0;">
            <div style="display:flex; align-items:center; gap:6px;">
              <span class="current-status-label">当前状态：</span>
              <span class="current-status-text" id="currentStatusText"></span>
            </div>
            <div id="currentRichTextRow" style="display:none; padding-left:2px;">
              <span style="font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:4px;">
                <span style="color:var(--color-accent); font-size:9px;">✨</span>
                <span id="currentRichText" style="color:var(--text-secondary);"></span>
              </span>
            </div>
          </div>
        </div>
        <button class="btn btn-ghost btn-xs" onclick="clearStatus()">清除</button>
      </div>

      <!-- 状态输入 -->
      <div class="input-group">
        <input
          type="text"
          id="statusInput"
          class="input"
          placeholder="上方显示名称（例：长门有希的忧郁）"
          maxlength="64"
          autocomplete="off"
        />
        <div class="char-count" id="charCount">0 / 64</div>
      </div>

      <!-- 游戏 AppID 选项 -->
      <div class="appid-row">
        <label class="toggle-label">
          <input type="checkbox" id="useAppId" onchange="toggleAppId()" checked />
          <span class="toggle-switch"></span>
          <span>关联真实游戏（AppID）</span>
        </label>
        <div class="appid-input-wrap" id="appIdWrap">
          <input
            type="number"
            id="appIdInput"
            class="input input-sm"
            placeholder="例：730 (CS2)"
            min="1"
            value="480"
          />
          <div class="appid-presets">
            <button class="preset-tag" onclick="setAppId(730)">CS2</button>
            <button class="preset-tag" onclick="setAppId(570)">Dota2</button>
            <button class="preset-tag" onclick="setAppId(440)">TF2</button>
            <button class="preset-tag" onclick="setAppId(1172470)">Apex</button>
            <button class="preset-tag" onclick="setAppId(252490)">Rust</button>
          </div>
        </div>
      </div>

      <!-- 吵闹模式 -->
      <div class="appid-row" style="margin-top: 10px;">
        <label class="toggle-label" title="开启后，每次设置状态会重新上线，强行给好友发送弹窗通知！">
          <input type="checkbox" id="noisyMode" />
          <span class="toggle-switch"></span>
          <span>📢 吵闹模式（弹窗通知好友）</span>
        </label>
      </div>

      <!-- Rich Presence 富文本子状态 -->
      <div class="appid-row" style="margin-top: 10px;">
        <label class="toggle-label" title="实验性功能：仅对部分游戏有效。发送 Rich Presence 消息，在好友列表显示富文本子状态。">
          <input type="checkbox" id="useRichPresence" onchange="toggleRichPresence()" />
          <span class="toggle-switch"></span>
          <span>🧪 Rich Presence 富文本子状态</span>
          <span style="font-size:10px; background:rgba(255,180,50,0.15); color:#f0b030; padding:1px 6px; border-radius:8px; margin-left:4px; font-weight:500;">实验性</span>
        </label>
        <div id="richPresenceWrap" style="display:none; margin-top:8px;">
          <!-- 手动输入框 -->
          <input
            type="text"
            id="richTextInput"
            class="input input-sm"
            placeholder="必须填 Token Key，如：#display_Lobby（从下方列表选择）"
            maxlength="128"
            autocomplete="off"
          />
          <input
            type="text"
            id="richPresenceStatusInput"
            class="input input-sm"
            placeholder="富文本状态内容，留空则使用上方显示名称"
            maxlength="128"
            autocomplete="off"
            style="margin-top:8px;"
          />

          <!-- Token 获取区域 -->
          <div style="margin-top:8px; display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
            <button
              class="btn btn-ghost btn-xs"
              id="fetchRpTokensBtn"
              onclick="fetchRpTokens()"
              title="根据上方填写的 AppID 拉取该游戏的 Rich Presence Token 列表"
            >
              🔍 从 AppID 获取可用 Tokens
            </button>
            <span id="rpTokensStatus" style="font-size:11px; color:var(--text-muted);"></span>
          </div>

          <!-- Token 下拉列表（动态填充） -->
          <div id="rpTokensDropdownWrap" style="display:none; margin-top:8px;">
            <select
              id="rpTokensSelect"
              class="input input-sm"
              onchange="applyRpToken()"
              style="cursor:pointer;"
            >
              <option value="">── 选择一个 Token 填入输入框 ──</option>
            </select>
            <div id="rpTokenPreview" style="font-size:11px; color:var(--text-muted); margin-top:4px; padding:4px 8px; background:rgba(255,255,255,0.04); border-radius:6px; display:none;"></div>
          </div>

          <div style="font-size:11px; color:var(--text-muted); margin-top:6px; line-height:1.4; padding:0 2px;">
            ℹ️ Token 显示效果取决于目标游戏的 Rich Presence 配置，关联真实游戏 AppID 时效果最佳。
          </div>
        </div>
      </div>

      <!-- 发送按钮 -->
      <button class="btn btn-primary btn-full" id="setBtn" onclick="setStatus()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
        设置状态
      </button>
    </div>

    <!-- 预设状态 -->
    <div class="card presets-card" id="presetsCard" style="display:none">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm4.24 16L12 15.45 7.77 18l1.12-4.81-3.73-3.23 4.92-.42L12 5l1.92 4.53 4.92.42-3.73 3.23L16.23 18z"/>
        </svg>
        快速预设
      </div>
      <div class="presets-grid" id="presetsGrid">
        <!-- 由 JS 动态渲染 -->
      </div>
      <div class="add-preset-row">
        <button class="btn btn-ghost btn-sm" onclick="saveCurrentAsPreset()">
          + 保存当前为预设
        </button>
        <button class="btn btn-ghost btn-sm danger" onclick="clearAllPresets()">
          清空预设
        </button>
      </div>
    </div>

    <!-- 历史记录 -->
    <div class="card history-card" id="historyCard" style="display:none">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
        </svg>
        历史记录
      </div>
      <div id="historyList" class="history-list">
        <div class="empty-hint">暂无历史记录</div>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div id="toastContainer" class="toast-container"></div>

  <script>
    // ────────────────────────────────────────────────────────────────────
    // 状态管理
    // ────────────────────────────────────────────────────────────────────
    let isLoggedIn = false;
    let currentUsername = null;
    let pendingGuardRequest = null;

    const DEFAULT_PRESETS = [
      { text: "在摸鱼 🐟", app_id: null },
      { text: "睡觉中 💤", app_id: null },
      { text: "学习中 📚", app_id: null },
      { text: "刷抖音 📱", app_id: null },
      { text: "吃饭中 🍜", app_id: null },
      { text: "健身中 💪", app_id: null },
    ];

    function getPresets() {
      const raw = localStorage.getItem("status_presets");
      return raw ? JSON.parse(raw) : DEFAULT_PRESETS;
    }

    function savePresets(presets) {
      localStorage.setItem("status_presets", JSON.stringify(presets));
    }

    function getHistory() {
      const raw = localStorage.getItem("status_history");
      return raw ? JSON.parse(raw) : [];
    }

    function addHistory(entry) {
      const list = getHistory();
      // 去重（相同上方名称、AppID、RP token 和 RP 内容不重复添加）
      const exists = list.some(h =>
        h.text === entry.text &&
        h.app_id === entry.app_id &&
        h.rich_text === entry.rich_text &&
        (h.rich_presence_status || "") === (entry.rich_presence_status || "")
      );
      if (!exists) {
        list.unshift({ ...entry, time: Date.now() });
        localStorage.setItem("status_history", JSON.stringify(list.slice(0, 30)));
      }
    }

    // ────────────────────────────────────────────────────────────────────
    // UI 更新
    // ────────────────────────────────────────────────────────────────────

    function updateConnectionUI(state) {
      const dot = document.getElementById("statusDot");
      const text = document.getElementById("connectionText");
      const badge = document.getElementById("connectionBadge");
      const accountName = document.getElementById("accountName");
      const accountStatus = document.getElementById("accountStatus");
      const logoutBtn = document.getElementById("logoutBtn");
      const setBtn = document.getElementById("setBtn");

      if (state.logged_in) {
        dot.className = "status-dot online";
        text.textContent = "已连接";
        badge.className = "connection-badge online";
        accountName.textContent = state.username || "已登录";
        accountStatus.textContent = "Steam Online";
        logoutBtn.style.display = "block";
        setBtn.disabled = false;
        isLoggedIn = true;
        currentUsername = state.username;
        
        document.getElementById("loginCard").style.display = "none";
        document.getElementById("accountCard").style.display = "block";
        document.getElementById("personaCard").style.display = "block";
        document.getElementById("mainCard").style.display = "block";
        document.getElementById("presetsCard").style.display = "block";
        document.getElementById("historyCard").style.display = "block";

        // 同步副状态按鈕选中状态
        if (state.current_persona_state !== undefined) {
          updatePersonaStateUI(state.current_persona_state);
        }
      } else {
        dot.className = "status-dot offline";
        text.textContent = "未连接";
        badge.className = "connection-badge";
        accountName.textContent = "未登录";
        accountStatus.textContent = "等待登录…";
        logoutBtn.style.display = "none";
        setBtn.disabled = true;
        isLoggedIn = false;
        
        document.getElementById("loginCard").style.display = "block";
        document.getElementById("accountCard").style.display = "none";
        document.getElementById("personaCard").style.display = "none";
        document.getElementById("mainCard").style.display = "none";
        document.getElementById("presetsCard").style.display = "none";
        document.getElementById("historyCard").style.display = "none";
        
        checkSessionStatus();
      }

      // 当前状态栏
      const bar = document.getElementById("currentStatusBar");
      const statusText = document.getElementById("currentStatusText");
      const richRow = document.getElementById("currentRichTextRow");
      const richText = document.getElementById("currentRichText");
      if (state.current_status) {
        bar.style.display = "flex";
        statusText.textContent = state.current_status;
        if (state.current_rich_text) {
          richRow.style.display = "block";
          richText.textContent = state.current_rich_presence_status
            ? `${state.current_rich_text} · ${state.current_rich_presence_status}`
            : state.current_rich_text;
        } else {
          richRow.style.display = "none";
        }
      } else {
        bar.style.display = "none";
      }
    }

    function renderPresets() {
      const grid = document.getElementById("presetsGrid");
      const presets = getPresets();
      grid.innerHTML = presets.map((p, i) => `
        <div class="preset-item" onclick="applyPreset(${i})">
          <div class="preset-text">${escapeHtml(p.text)}</div>
          ${p.app_id ? `<div class="preset-meta">AppID: ${p.app_id}</div>` : ""}
          <button class="preset-delete" onclick="deletePreset(event, ${i})">✕</button>
        </div>
      `).join("");
    }

    function renderHistory() {
      const list = document.getElementById("historyList");
      const history = getHistory();
      if (!history.length) {
        list.innerHTML = '<div class="empty-hint">暂无历史记录</div>';
        return;
      }
      list.innerHTML = history.map(h => `
        <div class="history-item" onclick="applyHistoryItem('${escapeAttr(h.text)}', ${h.app_id || 'null'}, ${h.rich_text ? "'" + escapeAttr(h.rich_text) + "'" : 'null'}, ${h.rich_presence_status ? "'" + escapeAttr(h.rich_presence_status) + "'" : 'null'})">
          <div class="history-text">${escapeHtml(h.text)}</div>
          <div class="history-meta">
            ${h.app_id ? `AppID: ${h.app_id} · ` : ""}${h.rich_text ? `🧪 ${escapeHtml(h.rich_text)} · ` : ""}${h.rich_presence_status ? `${escapeHtml(h.rich_presence_status)} · ` : ""}${formatTime(h.time)}
          </div>
        </div>
      `).join("");
    }

    function escapeHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
              .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
    }
    function escapeAttr(s) {
      return s.replace(/'/g, "\\'");
    }
    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleString("zh-CN", { month:"numeric", day:"numeric",
        hour:"2-digit", minute:"2-digit" });
    }

    async function setStatus() {
      const text = document.getElementById("statusInput").value.trim();
      if (!text) { showToast("请输入状态文字", "warn"); return; }

      const useAppId = document.getElementById("useAppId").checked;
      const appIdRaw = document.getElementById("appIdInput").value;
      const app_id = useAppId && appIdRaw ? parseInt(appIdRaw) : null;
      const noisyMode = document.getElementById("noisyMode").checked;
      const useRP = document.getElementById("useRichPresence").checked;
      const rich_text = useRP ? document.getElementById("richTextInput").value.trim() : null;
      const rich_presence_status = useRP
        ? document.getElementById("richPresenceStatusInput").value.trim()
        : "";

      // 校验 rich_text：勾选了 RP 时必须填写 Token Key
      if (useRP && !rich_text) {
        showToast("⚠️ 已勾选 Rich Presence，但 Token Key 为空。请从下方列表选择一个 Token，或取消勾选。", "warn");
        return;
      }
      // 校验 rich_text：必须是 # 开头的 token key
      if (rich_text && !rich_text.startsWith("#")) {
        showToast("⚠️ Rich Presence 必须填写 Token Key（以 # 开头），如 #display_Lobby。请从下方列表选择。", "warn");
        return;
      }
      // 警告：RP 在未关联真实 AppID 时通常对好友不可见
      if (rich_text && !app_id) {
        showToast("⚠️ Rich Presence 在未关联真实游戏 AppID 时可能对好友不可见，建议同时填写 AppID。", "warn");
      }
      const selectedToken = document.getElementById("rpTokensSelect")?.selectedOptions?.[0];
      const rich_presence_values = {};
      const placeholder_value = rich_presence_status || text;
      if (selectedToken && selectedToken.value === rich_text) {
        (selectedToken.dataset.placeholders || "")
          .split(",")
          .filter(Boolean)
          .forEach(key => { rich_presence_values[key] = placeholder_value; });
      }

      try {
        const res = await fetch("/api/status", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            text,
            app_id,
            noisy: noisyMode,
            rich_text: rich_text || null,
            rich_presence_status: rich_presence_status || null,
            rich_presence_values: Object.keys(rich_presence_values).length
              ? rich_presence_values
              : null,
          }),
        });
        const data = await res.json();
        if (data.success) {
          showToast("✅ 状态已设置！" + (rich_text ? " (含 Rich Presence)" : ""), "success");
          addHistory({ text, app_id, rich_text, rich_presence_status });
          renderHistory();
          await fetchState();
        } else {
          showToast("❌ " + data.error, "error");
        }
      } catch (e) {
        showToast("网络错误，请检查连接", "error");
      }
    }

    async function fetchRpTokens() {
      const useAppId = document.getElementById("useAppId").checked;
      const appIdRaw = document.getElementById("appIdInput").value.trim();
      if (!useAppId || !appIdRaw) {
        showToast("请先勾选并填写游戏 AppID", "warn");
        return;
      }

      const btn = document.getElementById("fetchRpTokensBtn");
      const status = document.getElementById("rpTokensStatus");
      const dropWrap = document.getElementById("rpTokensDropdownWrap");
      const select = document.getElementById("rpTokensSelect");

      btn.disabled = true;
      btn.textContent = "⏳ 获取中...";
      status.textContent = "";
      dropWrap.style.display = "none";

      try {
        const res = await fetch(`/api/rich_presence_tokens?app_id=${appIdRaw}`);
        const data = await res.json();

        if (!data.success || !data.tokens.length) {
          status.textContent = data.error || "该游戏没有配置 Rich Presence Tokens";
          status.style.color = "var(--color-error, #f56)";
          return;
        }

        // 填充下拉列表
        select.innerHTML = `<option value="">── 选择一个 Token 填入输入框（共 ${data.tokens.length} 个）──</option>`;
        data.tokens.forEach(t => {
          const opt = document.createElement("option");
          opt.value = t.token;
          opt.dataset.display = t.display;
          opt.dataset.placeholders = (t.placeholders || []).join(",");
          const placeholderHint = t.placeholders?.length
            ? `  ·  占位符：${t.placeholders.join(", ")}`
            : "";
          opt.textContent = `${t.token}  →  ${t.display}${placeholderHint}`;
          select.appendChild(opt);
        });

        dropWrap.style.display = "block";
        document.getElementById("rpTokenPreview").style.display = "none";
        status.textContent = `✅ 找到 ${data.tokens.length} 个 Token`;
        status.style.color = "var(--color-success, #4c4)";
      } catch (e) {
        status.textContent = "网络错误：" + e.message;
        status.style.color = "var(--color-error, #f56)";
      } finally {
        btn.disabled = false;
        btn.textContent = "🔍 从 AppID 获取可用 Tokens";
      }
    }

    function applyRpToken() {
      const select = document.getElementById("rpTokensSelect");
      const preview = document.getElementById("rpTokenPreview");
      const input = document.getElementById("richTextInput");
      const selected = select.options[select.selectedIndex];

      if (!selected || !selected.value) {
        preview.style.display = "none";
        return;
      }

      // 将所选 token key（以 # 开头）填入文本输入框
      input.value = selected.value;

      // 显示对应的展示字符串预览，后端会自动补齐 token 需要的占位符
      const displayStr = selected.dataset.display || "";
      const placeholders = (selected.dataset.placeholders || "")
        .split(",")
        .filter(Boolean);
      const placeholderText = placeholders.length
        ? `<br><span style="color:var(--text-muted)">占位符 ${escapeHtml(placeholders.join(", "))} 会用富文本状态内容自动填充</span>`
        : "";
      preview.innerHTML = `<span style="color:var(--color-accent);font-weight:600;">将发送 Token：</span>${escapeHtml(selected.value)}<br><span style="color:var(--text-muted)">好友看到的效果：${escapeHtml(displayStr)}</span>${placeholderText}`;
      preview.style.display = "block";
    }

    function updateCharCount() {
      const input = document.getElementById("statusInput");
      const count = document.getElementById("charCount");
      const len = input.value.length;
      count.textContent = `${len} / 64`;
      count.className = "char-count" + (len > 56 ? " warn" : "");

    document.getElementById("statusInput").addEventListener("input", updateCharCount);

    document.getElementById("richPresenceStatusInput").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); setStatus(); }

    // ────────────────────────────────────────────────────────────────────

    // ────────────────────────────────────────────────────────────────────

    function connectSSE() {
      const es = new EventSource("/api/events");
      es.onmessage = e => {
        if (!e.data || e.data.startsWith(":")) return;
        const evt = JSON.parse(e.data);
        handleServerEvent(evt);
      };
      es.onerror = () => {
        es.close();
        setTimeout(connectSSE, 3000);
      };
    }

    async function handleServerEvent(evt) {
      switch (evt.type) {
        case "logged_on":
          showToast("✅ Steam 登录成功！", "success");
          document.getElementById("guardCard").style.display = "none";
          document.getElementById("mobileApprovalCard").style.display = "none";
          document.getElementById("guardCodeInput").value = "";
          fetchState();
          // 检查是否需要提示保存凭证
          if (evt.data.need_save_prompt) {
            promptSaveCredentials(evt.data.username);
          }
          break;

        case "auth_code_required": {
          const card = document.getElementById("guardCard");
          const title = document.getElementById("guardTitle");
          const sub = document.getElementById("guardSubtitle");
          document.getElementById("mobileApprovalCard").style.display = "none";
          title.textContent = evt.data.is_two_factor
            ? "Steam 手机令牌验证" : "Steam Guard 邮件验证";
          sub.textContent = evt.data.mismatch
            ? "验证码错误，请重新输入" : evt.data.prompt;
          card.style.display = "block";
          document.getElementById("guardCodeInput").focus();
          break;
        }

        case "waiting_for_mobile_approval":
          document.getElementById("guardCard").style.display = "none";
          document.getElementById("mobileApprovalCard").style.display = "block";
          break;

        case "status_updated":
          fetchState();
          break;

        case "status_cleared":
          fetchState();
          break;

        case "disconnected":
          fetchState();
          showToast("⚠️ 与 Steam 断开连接", "warn");
          break;

        case "error":
          fetchState();
          showToast("❌ " + evt.data.message, "error");
          document.getElementById("mobileApprovalCard").style.display = "none";
          document.getElementById("guardCard").style.display = "none";
          // 重置登录按钮如果还在登录界面
          const btn = document.getElementById("loginBtn");
          if(btn) {
              btn.disabled = false;
              btn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg> 登录`;
          }
          break;
      }
    }

    // ────────────────────────────────────────────────────────────────────
    // Toast 通知
    // ────────────────────────────────────────────────────────────────────

    function showToast(msg, type = "info") {
      const container = document.getElementById("toastContainer");
      container.querySelectorAll(".toast").forEach((item) => item.remove());
      const toast = document.createElement("div");
      toast.className = `toast toast-${type}`;
      toast.textContent = msg;
      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add("show"));
      setTimeout(() => {
        toast.classList.remove("show");
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    // ────────────────────────────────────────────────────────────────────
    // 初始化
    // ────────────────────────────────────────────────────────────────────

    async function init() {
      await fetchState();
      renderPresets();
      renderHistory();
      connectSSE();
      // 每 10 秒轮询一次状态（作为 SSE 的兜底）
      setInterval(fetchState, 10000);
    }

    init();
  </script>
</body>
</html>
